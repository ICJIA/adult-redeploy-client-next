[build]
  Command = "npm run build"
  Publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Redirects for CMS-authored meeting links that used the wrong category slug
# (links live in published news article bodies and can't be edited from the
# Astro side). 301s so search engines / external sites update; safe to remove
# once Strapi content is corrected.
#
# `from` is UN-prefixed but `to` keeps /adultredeploy: in production the ICJIA
# proxy strips /adultredeploy before this site matches `from` (a prefixed `from`
# never fires — verified), while `to` is the public Location the browser follows
# and so must include the prefix.
[[redirects]]
  from = "/about/meetings/site-selection/adhoc-committee-meeting-01282026"
  to   = "/adultredeploy/about/meetings/ad-hoc/adhoc-committee-meeting-01282026"
  status = 301

[[redirects]]
  from = "/about/meetings/site-selection/adhoc-committee-meeting-10302025"
  to   = "/adultredeploy/about/meetings/ad-hoc/adhoc-committee-meeting-10302025"
  status = 301

[[redirects]]
  from = "/about/meetings/regular/ariob-meeting-2025-4"
  to   = "/adultredeploy/about/meetings/regular-oversight/ariob-meeting-2025-4"
  status = 301

# /sitemap.xml is the conventional path crawlers/Search Console use. @astrojs/sitemap
# regenerates the sitemap EVERY build, emitting an INDEX (sitemap-index.xml) plus the
# actual URL list in sitemap-0.xml. Point the conventional /sitemap.xml at the URL
# LIST (sitemap-0.xml) so it shows every page directly — the index lists only the one
# sub-sitemap, which read as "a single page". 200 rewrite (URL stays /sitemap.xml).
# UN-prefixed: the ICJIA proxy strips /adultredeploy before this site matches the path
# (verified). ARI is ~hundreds of URLs, well under @astrojs/sitemap's 45k split, so
# there is only ever sitemap-0.xml.
[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap-0.xml"
  status = 200

# View the based-pathed site DIRECTLY on the raw *.netlify.app host (ALL contexts,
# incl. production) — fast checks without the icjia.illinois.gov proxy. Astro emits
# files at the dist root while links carry the /adultredeploy prefix; these strip it
# so /adultredeploy/* resolves on the bare host (visit
# https://adultredeploy.netlify.app/adultredeploy/).
#
# SAFE for production + the proxy: the ICJIA proxy 200!-rewrites
# icjia.illinois.gov/adultredeploy/* -> this site /:splat, so proxied requests arrive
# already STRIPPED (/news, /_astro/…, /sitemap.xml) and never match /adultredeploy/* —
# this rule fires ONLY for direct raw-host visits. Canonical URLs point at
# icjia.illinois.gov (astro.config `site`), so there's no duplicate-content concern.
[[redirects]]
  from = "/adultredeploy/*"
  to = "/:splat"
  status = 200
[[redirects]]
  from = "/adultredeploy"
  to = "/"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options          = "SAMEORIGIN"
    X-Content-Type-Options   = "nosniff"
    # Explicit `0`. The legacy XSS filter itself has had CVEs in older
    # browsers; modern guidance is to disable rather than enable.
    X-XSS-Protection         = "0"
    Referrer-Policy          = "strict-origin-when-cross-origin"
    # FLoC opt-out (`interest-cohort=()`) plus the full feature-policy
    # deny list. Belt-and-suspenders alongside whatever the ICJIA proxy
    # sets — Netlify edge is the canary for direct-origin access.
    Permissions-Policy       = "accelerometer=(), camera=(), display-capture=(), fullscreen=(self), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), midi=(), payment=(), picture-in-picture=(), publickey-credentials-get=(), screen-wake-lock=(), usb=(), web-share=(), xr-spatial-tracking=(), interest-cohort=()"
    # HSTS preload-ready. The ICJIA proxy already sends an HSTS header;
    # duplicating at the origin covers direct-origin probes that bypass
    # the proxy and serves as the canonical source for the proxy team.
    Strict-Transport-Security = "max-age=31536000"
    # Process isolation: blocks cross-origin windows from accessing
    # this origin via window.opener.
    Cross-Origin-Opener-Policy   = "same-origin"
    # MUST be `cross-origin` (not `same-origin`) on public ICJIA sites,
    # otherwise modern browsers refuse to load /img/og-image.png into
    # external OG/Twitter card scrapers (Facebook, LinkedIn, Slack,
    # MetaPeek, GoogleBot). See checklist §"CORP cross-origin".
    Cross-Origin-Resource-Policy = "cross-origin"
    # img-src tightened: dropped the blanket `https:` source (which
    # negated CSP's image restriction) and `blob:` (no object URLs in
    # use). Every CMS image now ships from /_cms-img/ via the build-
    # time WebP pipeline; only `data:` and the Strapi origin remain.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://plausible.icjia.cloud; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://ari.icjia-api.cloud; font-src 'self' data:; connect-src 'self' https://ari.icjia-api.cloud https://researchhub.icjia-api.cloud https://archive.icjia.cloud https://plausible.icjia.cloud; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'"
