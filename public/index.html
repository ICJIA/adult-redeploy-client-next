<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=5, minimal-ui"
    />
    <meta name="Description" content="Adult Redeploy Illinois." />
    <link rel="icon" href="<%= BASE_URL %>favicon.ico" />
    <link rel="canonical" href="https://icjia.illinois.gov/adultredeploy/" data-vmid="canonical" />
    <title>ARI | Adult Redeploy Illinois</title>

    <!-- Preconnect to external origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />
    <link rel="preconnect" href="https://ari.icjia-api.cloud" crossorigin />

    <!-- Preload LCP image (state seal in home page about section) -->
    <link
      rel="preload"
      as="image"
      href="https://ari.icjia-api.cloud/uploads/state-seal-default-20190917T17255296.png"
      fetchpriority="high"
    />

    <!-- Async-load fonts — prevent render-blocking -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&family=Lato:wght@300;400;700;900&family=Material+Icons&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&family=Lato:wght@300;400;700;900&family=Material+Icons&display=swap" />
    </noscript>

    <!-- Async-load FontAwesome CSS -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
      integrity="sha384-DyZ88mC6Up2uqS4h/KRgHuoeGwBcD4Ng9SiP4dIRy0EXTlnuz47vAwmeGwVChigm"
      crossorigin="anonymous"
      media="print"
      onload="this.media='all'"
    />

    <!-- NProgress -->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/nprogress/0.2.0/nprogress.min.css"
      rel="stylesheet"
      integrity="sha384-QUGa0w7S89w/V+840rnBtrQYyUEd1VHb88E0/8vc9FvgRy7b7wHlk8S+o0bNJcv0"
      crossorigin="anonymous"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nprogress/0.2.0/nprogress.min.js" integrity="sha384-WVrcwN/kiINFnwTi170GvMPVLHVBao1WfcXL/BZAK3VaUaaWX0OOsxMgCiFmrIb1" crossorigin="anonymous"></script>

    <!-- Async-load animate.css (only used for one fadeIn) -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/3.7.2/animate.min.css"
      integrity="sha384-7/Tl0k65OTvDSvtuq7aPR7aa0aCz7ZKqHsbMRLxhzueldW+9MZpCe9LB1c5UBuNS"
      crossorigin="anonymous"
      media="print"
      onload="this.media='all'"
    />
    <!-- <script
      async
      defer
      data-domain="icjia.illinois.gov"
      src="https://analytics.icjia-api.cloud/js/plausible.outbound-links.js"
    ></script> -->

    <script
      defer
      data-domain="icjia.illinois.gov/adultredeploy"
      src="https://plausible.icjia.cloud/js/script.file-downloads.outbound-links.js"
    ></script>

    <base href="<%= BASE_URL %>" />
  </head>

  <body>
    <noscript>
      <strong
        >We're sorry but the Adult Redeploy Illinois website does not work
        without JavaScript. Please enable JavaScript to continue.</strong
      >
    </noscript>
    <div id="app"></div>

    <!-- built files will be auto injected -->
  </body>
</html>
